version: '3.8'

services:
  # TESTFORGE AI Backend Service
  testforge-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: testforge-ai-backend
    ports:
      - "5000:5000"
    environment:
      - TESTFORGE_APP_NAME=TESTFORGE AI
      - TESTFORGE_VERSION=2.0.0
      - TESTFORGE_PORT=5000
      - TESTFORGE_HOST=0.0.0.0
      - NODE_ENV=production
    volumes:
      - ./backend/src:/app/src
      - ./backend/node_modules:/app/node_modules
    networks:
      - testforge-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # TESTFORGE AI Frontend Service
  testforge-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: testforge-ai-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_BASE_URL=http://testforge-backend:5000
      - REACT_APP_APP_NAME=TESTFORGE AI
      - REACT_APP_VERSION=2.0.0
    depends_on:
      testforge-backend:
        condition: service_healthy
    networks:
      - testforge-network
    restart: unless-stopped

networks:
  testforge-network:
    driver: bridge

volumes:
  testforge-data:
    driver: local
